<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1220" />
    <title>Rocket League MMR Tracker</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="rotateOverlay" class="rotateOverlay" role="dialog" aria-modal="true" aria-label="Mode paysage requis">
      <div class="rotateCard">
        <div class="rotateTitle">Passe en mode paysage</div>
        <div class="rotateText">
          Cette app est faite pour être utilisée en <strong>horizontal</strong> (comme une Steam Deck).
        </div>
        <div class="rotateActions">
          <button id="tryLockBtn" class="primaryBtn" type="button">Forcer paysage</button>
          <button id="dismissRotateBtn" class="ghostBtn" type="button">OK</button>
        </div>
        <div class="rotateHint">Si “forcer” ne marche pas, tourne juste ton téléphone.</div>
      </div>
    </div>

    <div id="optionsOverlay" class="optionsOverlay" role="dialog" aria-modal="true" aria-label="Options">
      <div class="optionsCard">
        <div class="optionsTop">
          <div class="optionsTitle">Options</div>
          <button id="closeOptionsBtn" class="ghostBtn" type="button">Fermer</button>
        </div>
        <label class="field">
          <span>MMR actuel (optionnel)</span>
          <input id="currentMmrInput" inputmode="numeric" placeholder="ex: 1308" />
        </label>
        <div class="customRow">
          <input id="customDeltaInput" inputmode="numeric" placeholder="delta ex: +12 / -15" />
          <button id="addCustomBtn" class="primaryBtn" type="button">Ajouter</button>
        </div>
      </div>
    </div>

    <main class="deckLayout">
      <section class="deck card" aria-label="Stream deck">
        <div id="deckButtons" class="deckButtons">
          <button class="deckBtn pos" data-delta="8" type="button">+8</button>
          <button class="deckBtn pos" data-delta="9" type="button">+9</button>
          <button class="deckBtn pos" data-delta="10" type="button">+10</button>
          <button class="deckBtn neg" data-delta="-8" type="button">-8</button>
          <button class="deckBtn neg" data-delta="-9" type="button">-9</button>
          <button class="deckBtn neg" data-delta="-10" type="button">-10</button>
        </div>
      </section>

      <aside class="hud card" aria-label="Stats">
        <div class="hudTop">
          <div class="hudTitle">Stats</div>
          <div class="topRightBtns">
            <button id="lockBtn" class="ghostBtn" type="button" title="Essayer de forcer le mode paysage">Paysage</button>
            <button id="optionsBtn" class="ghostBtn" type="button" title="MMR / delta perso">Options</button>
            <button id="resetBtn" class="ghostBtn" type="button" title="Réinitialiser">Reset</button>
          </div>
        </div>

        <div class="hudStats">
          <div class="hudLine">
            <span>Total</span>
            <strong id="totalDelta">0</strong>
          </div>
          <div class="hudLine">
            <span>État</span>
            <span id="isPositive" class="pill neutral">Neutre</span>
          </div>
          <div class="hudLine">
            <span>MMR</span>
            <strong id="estimatedMmr" class="dim">—</strong>
          </div>
          <div class="hudLine">
            <span>Matchs</span>
            <strong id="matchCount">0</strong>
          </div>
        </div>

        <div class="hudControls">
          <button id="undoBtn" class="ghostBtn" type="button">Annuler dernier</button>
        </div>
      </aside>
    </main>

    <script src="./app.js" defer></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
